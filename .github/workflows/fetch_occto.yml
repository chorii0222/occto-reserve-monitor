name: OCCTO データ自動取得

on:
  schedule:
    - cron: '0 * * * *'   # 毎時0分に実行（JST 9時〜翌2時をカバー）
  workflow_dispatch:       # 手動実行も可能

jobs:
  fetch-occto-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージインストール
        run: pip install requests pandas

      - name: OCCTOからデータ取得してJSONに変換
        run: python scripts/fetch_occto.py

      - name: データをコミット・プッシュ
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --staged --quiet || git commit -m "🔄 OCCTO データ更新: $(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M JST')"
          git push
